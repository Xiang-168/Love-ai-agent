spring:
  application:
    name: ai-agent
  profiles:
    active: local
  ai:
    dashscope:
      # 需要替换为你自己的 key
      api-key: your-api-key
server:
  port: 8123
  severlet:
    context-path: /api

# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.hzx.controller
# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn